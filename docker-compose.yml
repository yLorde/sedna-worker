services:
  postgres:
    image: postgres:18
    container_name: sedna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_admin}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - ${POSTGRES_PORT-5437}:5437
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./configs/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5437 -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sedna-network

  sedna-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: sedna-worker
    container_name: sedna-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_URL: ${API_URL:-http://localhost:8080/api}
      DELAY_TIME: ${DELAY_TIME:-15}
      POSTGRES_DB: ${POSTGRES_DB:-db_admin}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      EMBEDDED_WORKER: ${EMBEDDED_WORKER:-0}
      MIGRATE_ON_RUN: ${MIGRATE_ON_RUN:-false}
      TIME_TO_CLEAR_OLD_DATA: ${TIME_TO_CLEAR_OLD_DATA:-4}
      CLEAR_OLD_DATA_ON_START: ${CLEAR_OLD_DATA_ON_START:-true}
      SIZE_OF_HEARTBEATS_TO_CALC_LATENCY: ${SIZE_OF_HEARTBEATS_TO_CALC_LATENCY:-25}
      SIZE_OF_STATUS_DATA_AFTER_CLEAR: ${SIZE_OF_STATUS_DATA_AFTER_CLEAR:-50}
      LOCAL_DATABASE_URL: ${LOCAL_DATABASE_URL:-postgres://admin:password123@postgres:5437/db_admin}
      PROD_DATABASE_URL: ${PROD_DATABASE_URL}
      CLEAR_OLD_DATA: ${CLEAR_OLD_DATA:-true}
      SAVE_DATA_ON_DATABASE: ${SAVE_DATA_ON_DATABASE:-true}
    networks:
      - sedna-network

networks:
  sedna-network:
    driver: bridge

volumes:
  postgres-data:
